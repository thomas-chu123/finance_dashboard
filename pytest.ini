[pytest]
testpaths = tests
pythonpath = backend
asyncio_mode = auto

markers =
    unit: 單元測試 — 快速、無外部依賴
    e2e: 端對端 API 測試 — 使用 FastAPI TestClient
    slow: 緩慢測試 — 需要真實網路連線或 DB

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

log_cli = true
log_cli_level = WARNING
